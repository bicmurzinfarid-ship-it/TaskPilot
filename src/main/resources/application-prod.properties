# PostgreSQL от Railway
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

# MongoDB от Railway или Atlas
spring.data.mongodb.host=${MONGOHOST:localhost}
spring.data.mongodb.port=${MONGOPORT:27017}
spring.data.mongodb.username=${MONGOUSER:}
spring.data.mongodb.password=${MONGOPASSWORD:}
spring.data.mongodb.database=taskpilot

# Загрузка файлов
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
taskpilot.upload.dir=/app/uploads

# JWT (задать в Railway как переменную окружения)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
