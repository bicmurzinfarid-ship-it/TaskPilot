spring.application.name=TaskPilot

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/taskpilot
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (опционально: http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JWT
jwt.secret=taskpilot-super-secret-key-for-jwt-signing-minimum-32-chars
jwt.expiration=86400000
