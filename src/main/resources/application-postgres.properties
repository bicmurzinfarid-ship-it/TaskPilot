# Профиль для PostgreSQL
# Запуск: добавь в VM options: -Dspring.profiles.active=postgres
# или переменную окружения: SPRING_PROFILES_ACTIVE=postgres

# PostgreSQL подключение
spring.datasource.url=jdbc:postgresql://localhost:5432/taskpilot
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=taskpilot_user
spring.datasource.password=твой_пароль

# JPA / Hibernate
# update — Hibernate сам создаёт/обновляет таблицы по сущностям (удобно для разработки)
# validate — только проверяет схему, не меняет (для продакшена)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# H2 консоль отключена — она только для H2
spring.h2.console.enabled=false
